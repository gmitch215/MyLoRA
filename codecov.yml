coverage:
  status:
    project:
      default:
        target: 75%
        threshold: 2%
    patch:
      default:
        target: 80%
        threshold: 5%

comment:
  layout: 'condensed_header, condensed_files, condensed_footer'
  require_changes: true

ignore:
  - 'tests/**/*'
  - 'playwright-report/**/*'
  - 'playwright-results/**/*'
  - 'coverage/**/*'
  - '**/*.spec.ts'
  - 'playwright.config.ts'
  - 'nuxt.config.ts'
  - 'wrangler.jsonc'
  - 'public/**/*'
  - '.nuxt/**/*'
  - '.output/**/*'
  - 'migrations/**/*'